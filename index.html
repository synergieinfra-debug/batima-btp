<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Chantier BTP — BATIMA</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      overflow:hidden;
      background:#0d0d1a;
      overscroll-behavior:none;
    }
    #root{width:100%;height:100%}
    
    /* Main layout - NO position:fixed */
    #chantier-root{
      width:100%;
      height:100dvh; /* dynamic viewport - shrinks when keyboard opens */
      height:100vh;  /* fallback */
      display:flex;
      flex-direction:column;
      overflow:hidden;
      background:#0d0d1a;
      font-family:'IBM Plex Sans','Segoe UI',sans-serif;
      color:#e8e8f0;
    }
    
    /* Tableaux : largeur fixe pour \xE9viter tout recompose lors de la saisie (mobile) */
    table { table-layout: fixed; }
    table input, table select { max-width: 100%; }
    /* Emp\xEAcher la cellule de contenu de forcer le tableau \xE0 s'agrandir */
    td { overflow: hidden; word-wrap: break-word; }
    
    /* PC : laisser les colonnes s'adapter au contenu (D\xE9signation s'\xE9largit) */
    @media (min-width: 1024px) {
      table { table-layout: auto; }
    }
    
    /* Top bar - fixed at top */
    #chantier-topbar{
      flex-shrink:0;
      height:55px;
      width:100%;
      z-index:10;
    }
    
    /* Scrollable content */
    #chantier-content{
      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      /* Key: this shrinks when keyboard opens because parent uses dvh */
    }
    
    /* Bottom nav - stays at bottom */
    #chantier-bottomnav{
      flex-shrink:0;
      height:56px;
      width:100%;
      z-index:10;
    }
    
    /* Drawer */
    #chantier-backdrop{
      position:fixed;inset:0;z-index:998;
      background:rgba(0,0,0,0.72);display:none;
    }
    #chantier-backdrop.open{display:block}
    #chantier-drawer{
      position:fixed;top:0;left:0;bottom:0;
      width:78vw;max-width:290px;z-index:999;
      background:#151528;
      display:flex;flex-direction:column;
      transform:translateX(-100%);
      transition:transform 0.25s ease;
      box-shadow:6px 0 24px rgba(0,0,0,0.5);
      overflow-y:auto;overflow-x:hidden;
    }
    #chantier-drawer.open{transform:translateX(0)}
    
    /* Support 100dvh via JS for older Android */
    @supports not (height: 100dvh) {
      #chantier-root { height: var(--vh, 100vh); }
    }

    /* KEYBOARD FIX: When any input is focused, allow page to reflow */
    input:focus, textarea:focus {
      /* Prevent zoom on iOS */
      font-size: 16px !important;
    }
</style>
</head>
